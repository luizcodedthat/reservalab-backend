spring:
  application:
    name: reservalab

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

server:
  port: ${PORT:8080}

ai:
  provider: freeapi
  free-llm:
    base-url: https://apifreellm.com
    api-key: ${AI_API_KEY}
    timeout-seconds: 120

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

logging:
  level:
    org.springframework.web: INFO